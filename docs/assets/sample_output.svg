<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, monospace">
  <defs>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#451a03;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" fill="#0f172a" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="720" height="46" fill="#1e293b" rx="12"/>
  <rect x="0" y="32" width="720" height="14" fill="#1e293b"/>
  <text x="24" y="30" font-size="13" font-weight="700" fill="#f1f5f9" letter-spacing="0.5">PulseGuard API — Scoring Response</text>
  <text x="696" y="30" text-anchor="end" font-size="11" fill="#475569">ASSISTIVE_ONLY · NOT_FINAL_DECISION</text>

  <!-- Score band indicator -->
  <rect x="24" y="60" width="672" height="72" rx="8" fill="url(#amber-grad)" stroke="#d97706" stroke-width="1.5"/>
  <text x="44" y="87" font-size="20" font-weight="800" fill="#fbbf24">AMBER</text>
  <text x="44" y="108" font-size="11" fill="#fcd34d">0.20 ≤ PD &lt; 0.40 — Refer for human review</text>
  <text x="640" y="82" text-anchor="end" font-size="32" font-weight="800" fill="#f59e0b">0.2847</text>
  <text x="640" y="100" text-anchor="end" font-size="10" fill="#d97706">probability of default</text>
  <text x="640" y="118" text-anchor="end" font-size="9.5" fill="#92400e">HUMAN_REVIEW_REQUIRED = true</text>

  <!-- Applicant info row -->
  <rect x="24" y="146" width="672" height="40" rx="6" fill="#1e293b"/>
  <text x="44" y="162" font-size="10" fill="#94a3b8">SK_ID_CURR</text>
  <text x="44" y="178" font-size="11" font-weight="600" fill="#e2e8f0">100002</text>
  <text x="190" y="162" font-size="10" fill="#94a3b8">AMT_CREDIT</text>
  <text x="190" y="178" font-size="11" font-weight="600" fill="#e2e8f0">406,597</text>
  <text x="336" y="162" font-size="10" fill="#94a3b8">AMT_INCOME_TOTAL</text>
  <text x="336" y="178" font-size="11" font-weight="600" fill="#e2e8f0">202,500</text>
  <text x="500" y="162" font-size="10" fill="#94a3b8">DAYS_EMPLOYED</text>
  <text x="500" y="178" font-size="11" font-weight="600" fill="#e2e8f0">−637 days</text>
  <text x="630" y="162" font-size="10" fill="#94a3b8">GENDER</text>
  <text x="630" y="178" font-size="11" font-weight="600" fill="#e2e8f0">M</text>

  <!-- SHAP section header -->
  <text x="24" y="214" font-size="11" font-weight="700" fill="#a5b4fc">TOP SHAP REASON CODES</text>
  <line x1="24" y1="220" x2="696" y2="220" stroke="#334155" stroke-width="1"/>

  <!-- SHAP bars -->
  <!-- Feature 1 — EXT_SOURCE_2 (positive risk) -->
  <text x="44" y="242" font-size="10.5" fill="#e2e8f0">EXT_SOURCE_2</text>
  <rect x="230" y="231" width="148" height="14" rx="3" fill="#dc2626" opacity="0.85"/>
  <text x="386" y="243" font-size="10" fill="#fca5a5">+0.0842</text>
  <text x="660" y="243" text-anchor="end" font-size="9.5" fill="#94a3b8">external credit score ↑ risk</text>

  <!-- Feature 2 — AMT_CREDIT / AMT_INCOME_TOTAL -->
  <text x="44" y="268" font-size="10.5" fill="#e2e8f0">credit_income_ratio</text>
  <rect x="230" y="257" width="110" height="14" rx="3" fill="#dc2626" opacity="0.75"/>
  <text x="348" y="269" font-size="10" fill="#fca5a5">+0.0614</text>
  <text x="660" y="269" text-anchor="end" font-size="9.5" fill="#94a3b8">credit-to-income ratio ↑ risk</text>

  <!-- Feature 3 — DAYS_EMPLOYED -->
  <text x="44" y="294" font-size="10.5" fill="#e2e8f0">DAYS_EMPLOYED</text>
  <rect x="230" y="283" width="62" height="14" rx="3" fill="#16a34a" opacity="0.85"/>
  <text x="300" y="295" font-size="10" fill="#86efac">−0.0341</text>
  <text x="660" y="295" text-anchor="end" font-size="9.5" fill="#94a3b8">employed recently ↓ risk</text>

  <!-- Feature 4 — AMT_ANNUITY -->
  <text x="44" y="320" font-size="10.5" fill="#e2e8f0">AMT_ANNUITY</text>
  <rect x="230" y="309" width="46" height="14" rx="3" fill="#dc2626" opacity="0.6"/>
  <text x="284" y="321" font-size="10" fill="#fca5a5">+0.0217</text>
  <text x="660" y="321" text-anchor="end" font-size="9.5" fill="#94a3b8">annuity relative to income ↑ risk</text>

  <!-- Feature 5 — DAYS_BIRTH -->
  <text x="44" y="346" font-size="10.5" fill="#e2e8f0">DAYS_BIRTH</text>
  <rect x="230" y="335" width="32" height="14" rx="3" fill="#16a34a" opacity="0.7"/>
  <text x="270" y="347" font-size="10" fill="#86efac">−0.0156</text>
  <text x="660" y="347" text-anchor="end" font-size="9.5" fill="#94a3b8">applicant age ↓ risk</text>

  <!-- Scale axis -->
  <line x1="230" y1="358" x2="500" y2="358" stroke="#334155" stroke-width="1"/>
  <text x="230" y="370" text-anchor="middle" font-size="8.5" fill="#475569">−0.15</text>
  <text x="365" y="370" text-anchor="middle" font-size="8.5" fill="#475569">0</text>
  <text x="500" y="370" text-anchor="middle" font-size="8.5" fill="#475569">+0.15</text>
  <line x1="365" y1="225" x2="365" y2="358" stroke="#475569" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Footer -->
  <rect x="0" y="390" width="720" height="30" fill="#1e293b" rx="0"/>
  <rect x="0" y="390" width="720" height="30" fill="#1e293b"/>
  <rect x="0" y="408" width="720" height="12" fill="#1e293b" rx="12"/>
  <text x="24" y="409" font-size="9.5" fill="#475569">Model: G4 XGBoost · AUC=0.6261 (demo) · Champion: LightGBM AUC=0.7769 not deployed — see Truth Boundary</text>
  <text x="696" y="409" text-anchor="end" font-size="9.5" fill="#475569">ASSISTIVE_ONLY</text>
</svg>
